events {
    worker_connections 1024;
}

http {
    # Docker Registry — /v2/
    upstream registry {
        server registry:5000;
    }

    # Update API — /update/
    upstream update_api {
        server update-server:8090;
    }

    server {
        listen 443 ssl;
        server_name _;

        # QNAP Let's Encrypt sertifikası (otomatik yenilenir, yol değişmez)
        ssl_certificate     /certs/cert;
        ssl_certificate_key /certs/key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 0;  # Registry push için sınır yok
        chunked_transfer_encoding on;

        # Docker Registry
        location /v2/ {
            proxy_pass         http://registry;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 900;
        }

        # Update API
        location /update/ {
            proxy_pass         http://update_api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # HTTP → HTTPS yönlendirme
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}
