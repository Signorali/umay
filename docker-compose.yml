version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-umay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-umay}
      POSTGRES_DB: ${POSTGRES_DB:-umay}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-umay} -d ${POSTGRES_DB:-umay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - umay-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - umay-network

  backend:
    image: signorali/umay-backend:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT:-1923}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./backups:/app/backups
    networks:
      - umay-network

  frontend:
    image: signorali/umay-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-1881}:80"
    depends_on:
      - backend
    networks:
      - umay-network

volumes:
  postgres_data:

networks:
  umay-network:
    driver: bridge
