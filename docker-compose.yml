version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: umay_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-umay}
      POSTGRES_USER: ${POSTGRES_USER:-umay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-umay} -d ${POSTGRES_DB:-umay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - umay_net

  redis:
    image: redis:7-alpine
    container_name: umay_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - umay_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: umay_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    volumes:
      - backend_storage:/app/storage
      - backend_backups:/app/backups
    ports:
      - "${BACKEND_PORT:-1923}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - umay_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: umay_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-1881}:80"
    depends_on:
      - backend
    networks:
      - umay_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umay_worker
    restart: unless-stopped
    command: ["arq", "app.worker.WorkerSettings"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    volumes:
      - ./backend/app:/app/app
      - backend_storage:/app/storage
      - backend_backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - umay_net

networks:
  umay_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  backend_backups:
